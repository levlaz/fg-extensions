version: 2.1

# Pass `extension: <name>` when triggering a pipeline to scope the run
# to a single workspace. Otherwise every extension listed in the `all`
# workflow's matrix runs in parallel.
parameters:
  extension:
    type: string
    default: ""

orbs:
  node: circleci/node@5

executors:
  node20:
    docker:
      - image: cimg/node:20.19

jobs:
  # Lint, build, test, and package a single extension workspace,
  # uploading the resulting .foxe file as a build artifact.
  test-ext:
    executor: node20
    parameters:
      ext:
        type: string
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Lint << parameters.ext >>
          command: npm --workspace << parameters.ext >> run lint
      - run:
          name: Build << parameters.ext >>
          command: npm --workspace << parameters.ext >> run build
      - run:
          name: Test << parameters.ext >>
          command: npm --workspace << parameters.ext >> test --if-present
      - run:
          name: Package << parameters.ext >>
          command: npm --workspace << parameters.ext >> run package
      - run:
          name: Collect .foxe artifact
          command: |
            mkdir -p /tmp/foxe
            cp extensions/<< parameters.ext >>/*.foxe /tmp/foxe/
      - store_artifacts:
          path: /tmp/foxe
          destination: foxe

workflows:
  # Default workflow: fan out across every extension in parallel.
  # Add new extensions to the matrix list below.
  all:
    when:
      equal: ["", << pipeline.parameters.extension >>]
    jobs:
      - test-ext:
          name: test-<< matrix.ext >>
          matrix:
            parameters:
              ext:
                - example-panel
                - form-publish-panel

  # Scoped workflow: runs only when the pipeline is triggered with an
  # `extension` parameter.
  one:
    unless:
      equal: ["", << pipeline.parameters.extension >>]
    jobs:
      - test-ext:
          name: test-<< pipeline.parameters.extension >>
          ext: << pipeline.parameters.extension >>
